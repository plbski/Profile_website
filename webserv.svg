<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d1a0d" />
      <stop offset="100%" stop-color="#0a0a0f" />
    </radialGradient>
    <linearGradient id="server-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e2e1e"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg-glow)"/>

  <!-- Grid -->
  <g opacity="0.1" stroke="#7fff6e" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="640" x2="1200" y2="640"/>
    <line x1="0" y1="720" x2="1200" y2="720"/>
    <line x1="80" y1="0" x2="80" y2="800"/><line x1="160" y1="0" x2="160" y2="800"/>
    <line x1="240" y1="0" x2="240" y2="800"/><line x1="320" y1="0" x2="320" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/><line x1="480" y1="0" x2="480" y2="800"/>
    <line x1="560" y1="0" x2="560" y2="800"/><line x1="640" y1="0" x2="640" y2="800"/>
    <line x1="720" y1="0" x2="720" y2="800"/><line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="880" y1="0" x2="880" y2="800"/><line x1="960" y1="0" x2="960" y2="800"/>
    <line x1="1040" y1="0" x2="1040" y2="800"/><line x1="1120" y1="0" x2="1120" y2="800"/>
  </g>

  <!-- SERVER rack body -->
  <rect x="460" y="180" width="280" height="380" rx="6" fill="url(#server-body)" stroke="#2a4a2a" stroke-width="1.5"/>

  <!-- Server units -->
  <rect x="472" y="196" width="256" height="36" rx="3" fill="#0d1a0d" stroke="#1e3e1e" stroke-width="1"/>
  <rect x="472" y="240" width="256" height="36" rx="3" fill="#0d1a0d" stroke="#1e3e1e" stroke-width="1"/>
  <rect x="472" y="284" width="256" height="36" rx="3" fill="#0d1a0d" stroke="#1e3e1e" stroke-width="1"/>
  <rect x="472" y="328" width="256" height="36" rx="3" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1.5"/>
  <rect x="472" y="372" width="256" height="36" rx="3" fill="#0d1a0d" stroke="#1e3e1e" stroke-width="1"/>
  <rect x="472" y="416" width="256" height="36" rx="3" fill="#0d1a0d" stroke="#1e3e1e" stroke-width="1"/>
  <rect x="472" y="460" width="256" height="36" rx="3" fill="#0d1a0d" stroke="#1e3e1e" stroke-width="1"/>
  <rect x="472" y="504" width="256" height="36" rx="3" fill="#0d1a0d" stroke="#1e3e1e" stroke-width="1"/>

  <!-- LED active row -->
  <circle cx="486" cy="346" r="4" fill="#7fff6e" filter="url(#glow-green)"/>
  <circle cx="500" cy="346" r="4" fill="#7fff6e" filter="url(#glow-green)" opacity="0.6"/>
  <circle cx="514" cy="346" r="4" fill="#7fff6e" filter="url(#glow-green)" opacity="0.3"/>

  <!-- LED dim rows -->
  <circle cx="486" cy="214" r="3" fill="#3a6a3a"/>
  <circle cx="486" cy="258" r="3" fill="#3a6a3a"/>
  <circle cx="486" cy="302" r="3" fill="#5a8a5a"/>
  <circle cx="486" cy="390" r="3" fill="#3a6a3a"/>
  <circle cx="486" cy="434" r="3" fill="#5a8a5a"/>
  <circle cx="486" cy="478" r="3" fill="#3a6a3a"/>
  <circle cx="486" cy="522" r="3" fill="#3a6a3a"/>

  <!-- Port slots -->
  <rect x="680" y="338" width="36" height="8" rx="2" fill="#0a0a0f" stroke="#2a4a2a" stroke-width="0.5"/>
  <rect x="680" y="350" width="36" height="8" rx="2" fill="#0a0a0f" stroke="#2a4a2a" stroke-width="0.5"/>

  <!-- Server labels -->
  <text x="600" y="575" text-anchor="middle" font-family="monospace" font-size="11" fill="#7fff6e" opacity="0.7" letter-spacing="3">WEBSERV / HTTP 1.1</text>
  <text x="600" y="600" text-anchor="middle" font-family="monospace" font-size="9" fill="#7fff6e" opacity="0.4" letter-spacing="2">select() / poll() / kqueue()</text>

  <!-- CLIENTS -->
  <!-- Client 1 -->
  <rect x="55" y="155" width="145" height="95" rx="4" fill="#0d1218" stroke="#1e2e3e" stroke-width="1"/>
  <rect x="55" y="155" width="145" height="13" rx="4" fill="#111820"/>
  <rect x="60" y="171" width="135" height="69" rx="2" fill="#060c12"/>
  <text x="127" y="190" text-anchor="middle" font-family="monospace" font-size="7" fill="#7fff6e">GET /index.html HTTP/1.1</text>
  <text x="127" y="202" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.7">Host: localhost:8080</text>
  <text x="127" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.5">Accept: text/html</text>
  <text x="127" y="230" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.4">Connection: keep-alive</text>
  <text x="127" y="270" text-anchor="middle" font-family="monospace" font-size="9" fill="#6eb5ff" opacity="0.6">CLIENT 01</text>

  <!-- Client 2 -->
  <rect x="55" y="330" width="145" height="95" rx="4" fill="#0d1218" stroke="#1e2e3e" stroke-width="1"/>
  <rect x="55" y="330" width="145" height="13" rx="4" fill="#111820"/>
  <rect x="60" y="346" width="135" height="69" rx="2" fill="#060c12"/>
  <text x="127" y="365" text-anchor="middle" font-family="monospace" font-size="7" fill="#7fff6e">POST /upload HTTP/1.1</text>
  <text x="127" y="377" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.7">Content-Type: multipart</text>
  <text x="127" y="389" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.5">Content-Length: 2048</text>
  <text x="127" y="405" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.4">Connection: keep-alive</text>
  <text x="127" y="445" text-anchor="middle" font-family="monospace" font-size="9" fill="#6eb5ff" opacity="0.6">CLIENT 02</text>

  <!-- Client 3 -->
  <rect x="55" y="505" width="145" height="95" rx="4" fill="#0d1218" stroke="#1e2e3e" stroke-width="1"/>
  <rect x="55" y="505" width="145" height="13" rx="4" fill="#111820"/>
  <rect x="60" y="521" width="135" height="69" rx="2" fill="#060c12"/>
  <text x="127" y="540" text-anchor="middle" font-family="monospace" font-size="7" fill="#7fff6e">DELETE /file HTTP/1.1</text>
  <text x="127" y="552" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.7">Authorization: Bearer</text>
  <text x="127" y="564" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.5">Connection: keep-alive</text>
  <text x="127" y="576" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.4">X-Token: abc123</text>
  <text x="127" y="620" text-anchor="middle" font-family="monospace" font-size="9" fill="#6eb5ff" opacity="0.6">CLIENT 03</text>

  <!-- RESPONSES -->
  <!-- Response 1 - 200 OK -->
  <rect x="1000" y="155" width="155" height="95" rx="4" fill="#0d1218" stroke="#1e2e3e" stroke-width="1"/>
  <rect x="1000" y="155" width="155" height="13" rx="4" fill="#111820"/>
  <rect x="1005" y="171" width="145" height="69" rx="2" fill="#060c12"/>
  <text x="1077" y="190" text-anchor="middle" font-family="monospace" font-size="7" fill="#7fff6e">HTTP/1.1 200 OK</text>
  <text x="1077" y="202" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.7">Content-Type: text/html</text>
  <text x="1077" y="214" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.5">Content-Length: 1024</text>
  <text x="1077" y="230" text-anchor="middle" font-family="monospace" font-size="7" fill="#7fff6e" opacity="0.35">&lt;html&gt;...&lt;/html&gt;</text>
  <text x="1077" y="270" text-anchor="middle" font-family="monospace" font-size="9" fill="#7fff6e" opacity="0.6">200 OK</text>

  <!-- Response 2 - 201 Created -->
  <rect x="1000" y="330" width="155" height="80" rx="4" fill="#0d1218" stroke="#1e2e3e" stroke-width="1"/>
  <rect x="1000" y="330" width="155" height="13" rx="4" fill="#111820"/>
  <rect x="1005" y="346" width="145" height="54" rx="2" fill="#060c12"/>
  <text x="1077" y="364" text-anchor="middle" font-family="monospace" font-size="7" fill="#ef9f27">HTTP/1.1 201 Created</text>
  <text x="1077" y="376" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.6">Location: /upload/42</text>
  <text x="1077" y="388" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.4">Content-Length: 0</text>
  <text x="1077" y="428" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef9f27" opacity="0.6">201 CREATED</text>

  <!-- Response 3 - 404 Not Found -->
  <rect x="1000" y="500" width="155" height="80" rx="4" fill="#0d1218" stroke="#1e2e3e" stroke-width="1"/>
  <rect x="1000" y="500" width="155" height="13" rx="4" fill="#111820"/>
  <rect x="1005" y="516" width="145" height="54" rx="2" fill="#060c12"/>
  <text x="1077" y="534" text-anchor="middle" font-family="monospace" font-size="7" fill="#e24b4a">HTTP/1.1 404 Not Found</text>
  <text x="1077" y="546" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.6">Content-Type: text/html</text>
  <text x="1077" y="558" text-anchor="middle" font-family="monospace" font-size="7" fill="#5a8a7a" opacity="0.4">Content-Length: 152</text>
  <text x="1077" y="598" text-anchor="middle" font-family="monospace" font-size="9" fill="#e24b4a" opacity="0.6">404 NOT FOUND</text>

  <!-- CONNECTION LINES - requests -->
  <line x1="200" y1="202" x2="460" y2="342" stroke="#7fff6e" stroke-width="1" stroke-dasharray="6 4" opacity="0.45"/>
  <rect x="295" y="260" width="42" height="14" rx="2" fill="#0a1a0a" stroke="#7fff6e" stroke-width="0.8" opacity="0.8"/>
  <text x="316" y="271" text-anchor="middle" font-family="monospace" font-size="6" fill="#7fff6e">GET</text>

  <line x1="200" y1="377" x2="460" y2="352" stroke="#7fff6e" stroke-width="1.5" opacity="0.75"/>
  <rect x="298" y="358" width="46" height="14" rx="2" fill="#0d2a0d" stroke="#7fff6e" stroke-width="1" filter="url(#glow-green)"/>
  <text x="321" y="369" text-anchor="middle" font-family="monospace" font-size="6" fill="#7fff6e">POST</text>

  <line x1="200" y1="552" x2="460" y2="362" stroke="#7fff6e" stroke-width="1" stroke-dasharray="6 4" opacity="0.3"/>
  <rect x="295" y="476" width="52" height="14" rx="2" fill="#0a1a0a" stroke="#7fff6e" stroke-width="0.8" opacity="0.55"/>
  <text x="321" y="487" text-anchor="middle" font-family="monospace" font-size="6" fill="#7fff6e">DELETE</text>

  <!-- CONNECTION LINES - responses -->
  <line x1="740" y1="342" x2="1000" y2="202" stroke="#7fff6e" stroke-width="1" stroke-dasharray="5 4" opacity="0.45"/>
  <rect x="838" y="256" width="42" height="14" rx="2" fill="#0a1a0a" stroke="#7fff6e" stroke-width="0.8" opacity="0.7"/>
  <text x="859" y="267" text-anchor="middle" font-family="monospace" font-size="6" fill="#7fff6e">200</text>

  <line x1="740" y1="352" x2="1000" y2="370" stroke="#ef9f27" stroke-width="1" stroke-dasharray="5 4" opacity="0.45"/>
  <rect x="838" y="354" width="42" height="14" rx="2" fill="#1a1000" stroke="#ef9f27" stroke-width="0.8" opacity="0.7"/>
  <text x="859" y="365" text-anchor="middle" font-family="monospace" font-size="6" fill="#ef9f27">201</text>

  <line x1="740" y1="362" x2="1000" y2="540" stroke="#e24b4a" stroke-width="1" stroke-dasharray="5 4" opacity="0.35"/>
  <rect x="838" y="436" width="42" height="14" rx="2" fill="#1a0808" stroke="#e24b4a" stroke-width="0.8" opacity="0.6"/>
  <text x="859" y="447" text-anchor="middle" font-family="monospace" font-size="6" fill="#e24b4a">404</text>

  <!-- Section labels -->
  <text x="127" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#6eb5ff" opacity="0.45" letter-spacing="2">CLIENTS</text>
  <text x="600" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#7fff6e" opacity="0.5" letter-spacing="2">SERVER</text>
  <text x="1077" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#7fff6e" opacity="0.45" letter-spacing="2">RESPONSES</text>

  <!-- Corner info -->
  <text x="30" y="770" font-family="monospace" font-size="9" fill="#7fff6e" opacity="0.2">// HTTP/1.1 — RFC 2616</text>
  <text x="1170" y="770" text-anchor="end" font-family="monospace" font-size="9" fill="#7fff6e" opacity="0.2">42 PROJECT — WEBSERV</text>
</svg>
